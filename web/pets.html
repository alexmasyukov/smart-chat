<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>smart-chat · галерея петов</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, Segoe UI, Roboto, sans-serif;
    background: #0e1116; color: #e8edf2; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; gap: 22px; padding: 28px 16px 60px;
  }
  h1 { font-size: 20px; font-weight: 700; margin: 0; letter-spacing: .3px; }
  .sub { color: #8b97a5; font-size: 13px; margin-top: -14px; text-align: center; }

  .actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; position: sticky; top: 0; }
  .actions button {
    appearance: none; border: 1px solid #2a3340; background: #161c24; color: #cdd6e0;
    padding: 9px 16px; border-radius: 10px; font-size: 14px; cursor: pointer; transition: .12s;
  }
  .actions button:hover { border-color: #3d4b5c; }
  .actions button.active {
    background: #1f6feb22; border-color: #4493f8; color: #cfe5ff;
    box-shadow: 0 0 0 1px #4493f855 inset;
  }

  .grid {
    display: grid; gap: 18px;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    width: 100%; max-width: 1000px;
  }
  .card {
    background: #131922; border: 1px solid #222b36; border-radius: 16px;
    padding: 14px 10px 12px; display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .card canvas { image-rendering: pixelated; border-radius: 10px; background: #0b0f15; }
  .card .name { font-size: 13px; color: #aeb9c5; }
  .hint { color: #6b7785; font-size: 12px; text-align: center; }
</style>
</head>
<body>
  <h1>Галерея петов</h1>
  <div class="sub">10 наземных персонажей. У всех один набор действий — переключай кнопками, анимация применяется ко всем сразу.</div>

  <div class="actions" id="actions"></div>
  <div class="grid" id="grid"></div>
  <div class="hint">Состояния как у десктоп-пета: покой (моргание), думает (•••), говорит (рот), колдует (искры + поскок).</div>

<script>
// ---------- утилиты построения спрайтов 16×16 ----------
function setCell(rows, r, c, ch) {
  const a = rows[r].split("");
  if (c < a.length) { a[c] = ch; rows[r] = a.join(""); }
  return rows;
}

// Стандартный «торс» (строки 4..12): глаза в строках 6–7 (кол.5,6 и 9,10),
// рот в строке 10 (кол.6–9). E — символ глаз, M — символ рта.
function torso(X, E, M) {
  const L = "...o", R = "o...";
  const full = L + X.repeat(8) + R;
  return [
    full,
    full,
    L + X + E + E + X + X + E + E + X + R, // глаза
    L + X + E + E + X + X + E + E + X + R,
    full,
    full,
    L + X + X + M + M + M + M + X + X + R, // рот
    full,
    full,
  ];
}

const FEET = ["...oooooooooo...", "....oo..oo......", "................"];
const FEET_WIDE = ["...oooooooooo...", "...o.oo..oo.o...", "................"];

// Из базового спрайта генерим кадры анимации (одинаковая логика для всех).
function buildPet(p) {
  const X = p.X, M = p.M || "m";
  const base = p.head.concat(torso(X, p.E || "w", M)).concat(p.feet || FEET);

  const blink = base.slice();
  for (const c of [5, 6, 9, 10]) { setCell(blink, 6, c, X); setCell(blink, 7, c, "o"); }

  const talkClosed = base.slice();
  setCell(talkClosed, 10, 6, X); setCell(talkClosed, 10, 9, X);

  const talkOpen = base.slice();
  for (const c of [6, 7, 8, 9]) setCell(talkOpen, 11, c, M);

  return { name: p.name, palette: p.palette, base, blink, talkOpen, talkClosed };
}

// ---------- 10 наземных персонажей ----------
const RAW = [
  { name: "Робот", X: "b", E: "a", M: "m",
    head: ["................", ".......aa.......", ".......oo.......", "...oooooooooo..."],
    palette: { o:"#16222e", b:"#80ccff", a:"#baf7ff", m:"#16222e" } },

  { name: "Кот", X: "c", E: "w", M: "m",
    head: ["................", "...o......o.....", "...oo....oo.....", "...oooooooooo..."],
    palette: { o:"#3a2a1a", c:"#f4a93c", w:"#ffffff", m:"#7a4a2a" } },

  { name: "Пёс", X: "n", E: "w", M: "m",
    head: ["................", "..o........o....", "..oo......oo....", "...oooooooooo..."],
    palette: { o:"#3a2a1a", n:"#c98a4e", w:"#ffffff", m:"#5a3a22" } },

  { name: "Цыплёнок", X: "y", E: "p", M: "k",
    head: ["................", "......oo........", "......yy........", "...oooooooooo..."],
    palette: { o:"#6b4e16", y:"#ffe05a", p:"#6b4e16", k:"#ff9a3c" } },

  { name: "Лягушка", X: "f", E: "w", M: "m", feet: FEET_WIDE,
    head: ["................", "................", "................", "...oooooooooo..."],
    palette: { o:"#1f5e2a", f:"#6fcf5b", w:"#ffffff", m:"#163f1e" } },

  { name: "Мишка", X: "r", E: "w", M: "m",
    head: ["................", "..oo......oo....", "..orro..orro....", "...oooooooooo..."],
    palette: { o:"#3a2517", r:"#b5793f", w:"#ffffff", m:"#3a2517" } },

  { name: "Зайчик", X: "l", E: "p", M: "m",
    head: [".....o..o.......", ".....oU.oU......", ".....oU.oU......", "...oooooooooo..."],
    palette: { o:"#5a4636", l:"#f0eef2", p:"#5a4636", U:"#ff9ab0", m:"#a05a6a" } },

  { name: "Пингвин", X: "g", E: "w", M: "k",
    head: ["................", "................", "....oooooo......", "...oooooooooo..."],
    palette: { o:"#15151b", g:"#2b2b33", w:"#ffffff", k:"#ff9a3c" } },

  { name: "Дракончик", X: "v", E: "w", M: "m",
    head: ["................", "....o.o.o.o.....", "...oooooooooo...", "...ovvvvvvvvo..."],
    palette: { o:"#1d4d3a", v:"#54c79a", w:"#ffffff", m:"#123528" } },

  { name: "Грибок", X: "t", E: "p", M: "m",
    head: ["....oooooo......", "...occsscco.....", "..occcccccco....", "...oooooooooo..."],
    palette: { o:"#5a2a2a", t:"#e8d8b0", c:"#e0473b", s:"#ffffff", p:"#5a2a2a", m:"#5a2a2a" } },
];

const PETS = RAW.map(buildPet);

// ---------- действия ----------
const ACTIONS = [
  { id: "idle", label: "Покой" },
  { id: "thinking", label: "Думает" },
  { id: "talking", label: "Говорит" },
  { id: "working", label: "Колдует" },
];
let action = "idle";
let tick = 0;

function frameFor(pet) {
  switch (action) {
    case "talking": return (Math.floor(tick / 2) % 2 === 0) ? pet.talkOpen : pet.talkClosed;
    case "idle":    return (tick % 32 < 2) ? pet.blink : pet.base;
    default:        return pet.base; // thinking / working — база + оверлеи
  }
}
function bobFor() {
  switch (action) {
    case "working":  return Math.abs((tick % 4) - 2) * 2;
    case "thinking": return Math.sin(tick * 0.4) * 1.5;
    default:         return Math.sin(tick * 0.22) * 2;
  }
}

const SCALE = 8, GRID = 16;
const CW = 160, CH = 168, OX = (CW - GRID * SCALE) / 2, OY = 26;

function drawPet(ctx, pet) {
  ctx.clearRect(0, 0, CW, CH);
  const frame = frameFor(pet);
  const bob = bobFor();

  ctx.fillStyle = "rgba(0,0,0,0.22)";
  ctx.beginPath();
  ctx.ellipse(CW / 2, OY + GRID * SCALE - 6, 40, 7, 0, 0, Math.PI * 2);
  ctx.fill();

  for (let r = 0; r < frame.length && r < GRID; r++) {
    const row = frame[r] || "";
    for (let c = 0; c < GRID; c++) {
      const col = pet.palette[row[c]];
      if (!col) continue;
      ctx.fillStyle = col;
      ctx.fillRect(OX + c * SCALE, OY + r * SCALE + bob, SCALE, SCALE);
    }
  }

  if (action === "thinking") {
    const n = (Math.floor(tick / 6) % 3) + 1;
    ctx.fillStyle = "#cfe5ff";
    ctx.font = "16px monospace";
    ctx.fillText("•".repeat(n), CW / 2 + 30, OY + 14);
  }
  if (action === "working") {
    ctx.fillStyle = "#ffe07a";
    ctx.font = "14px monospace";
    const a = (Math.floor(tick / 4) % 2 === 0);
    ctx.fillText("✦", a ? OX - 2 : OX + GRID * SCALE - 10, OY + 28);
    ctx.fillText("✦", a ? OX + GRID * SCALE - 8 : OX + 2, OY + 72);
  }
}

// ---------- DOM ----------
const grid = document.getElementById("grid");
const canvases = [];
for (const pet of PETS) {
  const card = document.createElement("div");
  card.className = "card";
  const cv = document.createElement("canvas");
  cv.width = CW; cv.height = CH;
  const name = document.createElement("div");
  name.className = "name"; name.textContent = pet.name;
  card.appendChild(cv); card.appendChild(name);
  grid.appendChild(card);
  canvases.push({ ctx: cv.getContext("2d"), pet });
}

const actionsBar = document.getElementById("actions");
const buttons = {};
for (const a of ACTIONS) {
  const b = document.createElement("button");
  b.textContent = a.label;
  b.onclick = () => setAction(a.id);
  actionsBar.appendChild(b);
  buttons[a.id] = b;
}
function setAction(id) {
  action = id;
  for (const k in buttons) buttons[k].classList.toggle("active", k === id);
}
setAction("idle");

setInterval(() => {
  tick++;
  for (const { ctx, pet } of canvases) drawPet(ctx, pet);
}, 90);
</script>
</body>
</html>
